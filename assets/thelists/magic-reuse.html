<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Lists — Magic → Reuse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; }
  #stage {
    width: 900px; height: 600px; position: relative; overflow: hidden;
    background: linear-gradient(135deg, #f0f1fa 0%, #dce1f4 52%, #d0d8f0 100%);
    font-family: 'Lato', -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex; align-items: center; justify-content: center;
  }
  #shell {
    background: #15140f; border-radius: 46px; padding: 11px;
    box-shadow: 0 40px 80px -30px rgba(20,18,10,.55), inset 0 0 0 2px #2d2a22;
    transform: scale(.855); transform-origin: center;
  }
  #screen {
    position: relative; width: 300px; height: 650px;
    background: #fdfaf2; border-radius: 36px; overflow: hidden;
  }
  .statusbar {
    position: absolute; top: 0; left: 0; right: 0; height: 44px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 22px; font-size: 13px; font-weight: 500; color: #1c1c15;
  }
  .statusbar .icons { display: flex; gap: 6px; align-items: center; }
  .statusbar svg { display: block; }
  .back  { position: absolute; top: 54px; left: 15px; }
  .reset { position: absolute; top: 54px; right: 15px; transform-origin: 50% 50%; }

  /* generating layer */
  #genLayer {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 18px;
  }
  #genLayer .spark { filter: drop-shadow(0 6px 14px rgba(155,64,4,.3)); }
  #genLayer .gtext { font-size: 15px; font-weight: 500; color: #9b4004; letter-spacing: .01em; }
  #genLayer .gsub  { font-size: 12px; color: #9c988f; margin-top: -8px; }

  /* result layer */
  #resultLayer { position: absolute; inset: 0; }
  .genlabel {
    position: absolute; top: 82px; left: 16px; display: flex; align-items: center; gap: 6px;
    font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: #9b4004;
  }
  .title {
    position: absolute; top: 100px; left: 16px; right: 16px;
    font-size: 24px; font-weight: 500; color: #1c1c15; letter-spacing: -.02em;
    white-space: nowrap;
  }
  .subtitle { position: absolute; top: 138px; left: 16px; font-size: 12px; font-weight: 500; color: #9c988f; }
  .progtext { position: absolute; top: 166px; left: 16px; font-size: 11px; font-weight: 500; color: #9c988f; }
  .progtrack {
    position: absolute; top: 186px; left: 16px; right: 16px; height: 5px;
    border-radius: 3px; background: #efe7d6; overflow: hidden;
  }
  .progfill { height: 100%; width: 0%; border-radius: 3px; background: #9b4004; }

  #items { position: absolute; top: 210px; left: 16px; right: 16px; }
  .row {
    display: flex; align-items: center; gap: 11px; height: 44px;
    background: #fff; border: 1px solid #efe7d6; border-radius: 12px;
    padding: 0 13px; margin-bottom: 8px;
  }
  .box {
    width: 20px; height: 20px; flex: 0 0 auto; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    background: #fff; border: 1.5px solid #cfcabd;
  }
  .box svg { opacity: 0; }
  .label { position: relative; font-size: 14px; font-weight: 500; color: #1c1c15; white-space: nowrap; }
  .label .strike {
    position: absolute; left: 0; top: 51%; height: 1.5px; width: 100%;
    background: #c4bfb2; transform: scaleX(0); transform-origin: left center;
  }

  /* reset toast */
  #toast {
    position: absolute; left: 16px; right: 16px; bottom: 20px;
    display: flex; align-items: center; gap: 9px;
    background: #1c1c15; color: #fdfaf2; border-radius: 13px;
    padding: 12px 14px; font-size: 12px; font-weight: 500;
    transform: translateY(70px); opacity: 0;
    box-shadow: 0 16px 30px -14px rgba(20,18,10,.6);
  }
  #toast svg { flex: 0 0 auto; }
</style>
</head>
<body>
<div id="stage">
  <div id="shell">
    <div id="screen">
      <div class="statusbar">
        <span>9:41</span>
        <span class="icons">
          <svg width="17" height="11" viewBox="0 0 17 11"><g fill="#1c1c15">
            <rect x="0"  y="7" width="3" height="4" rx="1"/><rect x="4"  y="5" width="3" height="6" rx="1"/>
            <rect x="8"  y="3" width="3" height="8" rx="1"/><rect x="12" y="1" width="3" height="10" rx="1"/></g></svg>
          <svg width="16" height="11" viewBox="0 0 16 12" fill="none" stroke="#1c1c15" stroke-width="1.4" stroke-linecap="round">
            <path d="M1 4.2C3 2.4 5.4 1.4 8 1.4s5 1 7 2.8"/><path d="M3.4 6.8C4.7 5.7 6.3 5.1 8 5.1s3.3.6 4.6 1.7"/>
            <path d="M5.9 9.3C6.5 8.8 7.2 8.5 8 8.5s1.5.3 2.1.8"/></svg>
          <svg width="24" height="12" viewBox="0 0 24 12"><rect x="1" y="1" width="19" height="10" rx="3" fill="none" stroke="#1c1c15" stroke-opacity=".5" stroke-width="1"/><rect x="3" y="3" width="13" height="6" rx="1.5" fill="#1c1c15"/><rect x="21" y="4" width="2" height="4" rx="1" fill="#1c1c15" fill-opacity=".5"/></svg>
        </span>
      </div>

      <svg class="back" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1c1c15" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg>
      <svg class="reset" id="resetIcon" width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="#9b4004" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4.5 9a7.5 7.5 0 1 1-1 4"/><path d="M4.5 4v5h5"/></svg>

      <div id="genLayer">
        <svg class="spark" id="genSpark" width="58" height="58" viewBox="0 0 24 24" fill="#9b4004">
          <path d="M12 2l1.6 5.6L19 9.2l-5.4 1.6L12 16l-1.6-5.2L5 9.2l5.4-1.6z"/>
          <path d="M18.5 14l.8 2.6 2.6.8-2.6.8-.8 2.6-.8-2.6-2.6-.8 2.6-.8z" opacity=".8"/></svg>
        <div class="gtext">Generating your checklist…</div>
        <div class="gsub">Reading recipe-blog.com/banana-bread</div>
      </div>

      <div id="resultLayer">
        <div class="genlabel">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="#9b4004"><path d="M12 3.5 13.7 10.3 20.5 12 13.7 13.7 12 20.5 10.3 13.7 3.5 12 10.3 10.3Z"/></svg>
          GENERATED CHECKLIST
        </div>
        <div class="title">banana bread 🍌</div>
        <div class="subtitle">6 ingredients · recipe-blog.com</div>
        <div class="progtext" id="progtext">0 of 6 completed</div>
        <div class="progtrack"><div class="progfill" id="progfill"></div></div>
        <div id="items"></div>
      </div>

      <div id="toast">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#f3c8a8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 9a7.5 7.5 0 1 1-1 4"/><path d="M4.5 4v5h5"/></svg>
        <span>List reset — ready to reuse</span>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  var LABELS = ["3 ripe bananas 🍌","2 cups flour","1 cup sugar","1/2 cup butter","2 eggs 🥚","1 tsp baking soda"];
  var itemsEl = document.getElementById('items');
  var rows = LABELS.map(function (txt) {
    var row = document.createElement('div'); row.className = 'row';
    var box = document.createElement('div'); box.className = 'box';
    box.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.5l4.5 4.5L19 6.5"/></svg>';
    var label = document.createElement('div'); label.className = 'label';
    label.innerHTML = '<span class="txt"></span><span class="strike"></span>';
    label.querySelector('.txt').textContent = txt;
    row.appendChild(box); row.appendChild(label);
    itemsEl.appendChild(row);
    return { row: row, box: box, check: box.querySelector('svg'), strike: label.querySelector('.strike'), txt: label.querySelector('.txt') };
  });

  var genLayer = document.getElementById('genLayer');
  var resultLayer = document.getElementById('resultLayer');
  var genSpark = document.getElementById('genSpark');
  var progfill = document.getElementById('progfill');
  var progtext = document.getElementById('progtext');
  var resetIcon = document.getElementById('resetIcon');
  var toast = document.getElementById('toast');

  // ---- timeline (ms) ----
  var GEN = 1350, REVEAL = 800, PER = 470, CHECK = PER * 6, DONE = 1050, RESET = 850, HOLD = 900;
  var tGen = 0, tReveal = tGen + GEN, tCheck = tReveal + REVEAL, tDone = tCheck + CHECK,
      tReset = tDone + DONE, tHold = tReset + RESET, LOOP = tHold + HOLD;

  function clamp01(x){ return x < 0 ? 0 : x > 1 ? 1 : x; }
  function lerp(a,b,t){ return a + (b - a) * t; }
  function easeInOut(t){ return t < .5 ? 2*t*t : 1 - Math.pow(-2*t+2, 2)/2; }
  function easeOut(t){ return 1 - Math.pow(1 - t, 3); }
  function mix(c1, c2, t){
    return 'rgb(' + [0,1,2].map(function(i){ return Math.round(lerp(c1[i], c2[i], t)); }).join(',') + ')';
  }
  var WHITE=[255,255,255], BLUE=[53,96,150], BORDER=[207,202,189], INK=[28,28,21], MUTE=[156,152,143];

  function render(t) {
    t = ((t % LOOP) + LOOP) % LOOP;

    // gen -> result crossfade, with a tail that fades back to "generating" so the loop is seamless
    var TAIL = 340;
    var genOut = clamp01((t - (tReveal - 250)) / 300);
    var backIn = clamp01((t - (LOOP - TAIL)) / TAIL);
    genLayer.style.opacity = Math.max(1 - genOut, backIn);
    resultLayer.style.opacity = Math.min(clamp01((t - (tReveal - 150)) / 320), 1 - backIn);
    var pulse = 0.5 + 0.5 * Math.sin(t / 1350 * Math.PI * 4);
    genSpark.style.transform = 'scale(' + lerp(0.9, 1.12, pulse) + ') rotate(' + lerp(-6,6,pulse) + 'deg)';

    // per-item checked amount c[k]
    var checkedSum = 0;
    for (var k = 0; k < 6; k++) {
      // reveal slide-in
      var rv = easeOut(clamp01((t - (tReveal + k * 70)) / 360));
      rows[k].row.style.opacity = rv;
      rows[k].row.style.transform = 'translateY(' + lerp(10, 0, rv) + 'px)';

      var c;
      if (t < tCheck) c = 0;
      else if (t < tDone) c = clamp01((t - (tCheck + k * PER)) / (PER * 0.62));
      else if (t < tReset) c = 1;
      else c = 1 - easeInOut(clamp01((t - tReset) / (RESET * 0.7)));   // uncheck together on reset
      checkedSum += c;

      rows[k].box.style.background = mix(WHITE, BLUE, c);
      rows[k].box.style.borderColor = mix(BORDER, BLUE, c);
      rows[k].check.style.opacity = clamp01((c - 0.15) / 0.5);
      rows[k].strike.style.transform = 'scaleX(' + c + ')';
      rows[k].txt.style.color = mix(INK, MUTE, c);
    }

    var frac = checkedSum / 6;
    progfill.style.width = (frac * 100) + '%';
    var n = Math.round(checkedSum);
    progtext.textContent = (t >= tDone && t < tReset)
      ? '6 of 6 completed 🎉'
      : n + ' of 6 completed';

    // reset button spin + toast
    var rp = clamp01((t - tReset) / RESET);
    var spin = (t >= tReset && t < tHold) ? -360 * easeInOut(rp) : 0;
    var rscale = (t >= tReset && t < tReset + 300) ? lerp(1, 1.28, Math.sin(clamp01((t - tReset)/300) * Math.PI)) : 1;
    resetIcon.style.transform = 'rotate(' + spin + 'deg) scale(' + rscale + ')';

    var toastIn = easeOut(clamp01((t - tReset) / 260));
    var toastOut = clamp01((t - (tHold + 250)) / 350);
    var toastVis = (t >= tReset) ? toastIn * (1 - toastOut) : 0;
    toast.style.opacity = toastVis;
    toast.style.transform = 'translateY(' + lerp(70, 0, toastVis) + 'px)';
  }

  // deterministic capture hook
  window.__loop = LOOP;
  window.__seek = function (t) { window.__paused = true; render(t); };

  var start = null;
  function frame(now) {
    if (!window.__paused) {
      if (start === null) start = now;
      render(now - start);
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
