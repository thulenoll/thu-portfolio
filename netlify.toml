# Static site — no build step. Publish the repo root as-is.
[build]
  publish = "."

# Clean URL for the Work section: a direct hit to /work serves the homepage
# (status 200 keeps the /work URL in the address bar); JS then scrolls to #work.
[[redirects]]
  from = "/work"
  to = "/index.html"
  status = 200

# Friendly 404 (optional): serve the homepage for unknown paths is NOT desired
# for a portfolio, so we leave Netlify's default 404 behavior in place.
