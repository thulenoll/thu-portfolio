<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Literata:ital,opsz,wght@0,7..72,200..900;1,7..72,200..900&family=Manrope:wght@200..800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../design-system.css">
<style>
  body { padding: var(--s-5); }
  .card { padding: var(--s-5); }
  .card-meta {
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-faint);
    margin-bottom: var(--s-3);
  }
  .swatches { display: grid; gap: var(--s-3); margin-top: var(--s-3); }
</style>
</head>
<body>

<div class="card">
  <div class="card-meta">Terra · Earth / warm</div>
  <div class="swatches" style="grid-template-columns: repeat(3, 1fr);">
    <div style="display:flex; flex-direction:column; gap: var(--s-2);">
    <div style="aspect-ratio: 16/10; background: var(--terra); border-radius: var(--s-1); border: 1px solid var(--line-soft);"></div>
    <div style="display:flex; flex-direction:column; gap: 2px;">
      <span class="mono" style="font-size: 10px; color: var(--ink); text-transform: none; letter-spacing: 0.02em;">--terra</span>
      <span class="mono" style="font-size: 9.5px; color: var(--ink-faint);">#5C3F28</span>
      <span style="font-size: 11px; color: var(--ink-soft); margin-top: 2px;">Terra · CTAs, links</span>
    </div>
  </div>
    <div style="display:flex; flex-direction:column; gap: var(--s-2);">
    <div style="aspect-ratio: 16/10; background: var(--terra-deep); border-radius: var(--s-1); border: 1px solid var(--line-soft);"></div>
    <div style="display:flex; flex-direction:column; gap: 2px;">
      <span class="mono" style="font-size: 10px; color: var(--ink); text-transform: none; letter-spacing: 0.02em;">--terra-deep</span>
      <span class="mono" style="font-size: 9.5px; color: var(--ink-faint);">#3D2A1A</span>
      <span style="font-size: 11px; color: var(--ink-soft); margin-top: 2px;">Deep · hero, outcome</span>
    </div>
  </div>
    <div style="display:flex; flex-direction:column; gap: var(--s-2);">
    <div style="aspect-ratio: 16/10; background: var(--terra-tint); border-radius: var(--s-1); border: 1px solid var(--line-soft);"></div>
    <div style="display:flex; flex-direction:column; gap: 2px;">
      <span class="mono" style="font-size: 10px; color: var(--ink); text-transform: none; letter-spacing: 0.02em;">--terra-tint</span>
      <span class="mono" style="font-size: 9.5px; color: var(--ink-faint);">#EDDFD1</span>
      <span style="font-size: 11px; color: var(--ink-soft); margin-top: 2px;">Tint · diagram fills</span>
    </div>
  </div>
  </div>
</div>
</body>
</html>
