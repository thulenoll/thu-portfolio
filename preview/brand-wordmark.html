<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Literata:ital,opsz,wght@0,7..72,200..900;1,7..72,200..900&family=Manrope:wght@200..800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../design-system.css">
<style>
  body { padding: var(--s-5); }
  .card { padding: var(--s-5); }
  .card-meta {

    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-faint);
    margin-bottom: var(--s-3);

  .swatches { display: grid; gap: var(--s-3); margin-top: var(--s-3); }

<body>

<div class="card">
  <div class="card-meta">Wordmark · "th" circle + Thu Le · Literata italic 60opsz</div>
  <div style="display: flex; align-items: center; gap: var(--s-4); margin-top: var(--s-4);">
    <div class="wordmark-circle" style="width: 48px; height: 48px; font-size: 22px;">th</div>
    <div class="wordmark-name" style="font-size: 32px;">Thu Le</div>
  </div>
