<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Literata:ital,opsz,wght@0,7..72,200..900;1,7..72,200..900&family=Manrope:wght@200..800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../design-system.css">
<style>
  body { padding: var(--s-5); }
  .card { padding: var(--s-5); }
  .card-meta {
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-faint);
    margin-bottom: var(--s-3);
  }
  .swatches { display: grid; gap: var(--s-3); margin-top: var(--s-3); }
</style>
</head>
<body>

<div class="card" style="padding: 0; overflow: hidden;">
  <div style="background: var(--terra-deep); color: var(--bg); padding: var(--s-12) var(--s-8);">
    <div class="mono" style="color: var(--accent-light); margin-bottom: var(--s-6);">A portfolio, 2014 — Present</div>
    <div style="font-family: var(--font-serif); font-weight: 350; font-size: 42px; line-height: 1.06; letter-spacing: -0.022em; max-width: 18ch; margin-bottom: var(--s-5); font-variation-settings: 'opsz' 144;">
      I design brands, products, and the <em style="color: var(--accent-light); font-style: italic;">systems</em> that hold them together.
    </div>
    <div style="font-size: 16px; line-height: 1.5; max-width: 56ch; margin-bottom: var(--s-5);">Bridging brand and product through design systems and AI-native foundations.</div>
    <div class="mono" style="color: var(--accent-light); letter-spacing: 0.06em;">Bay Area · 10+ years · Fintech · Biotech · SaaS</div>
  </div>
</div>
