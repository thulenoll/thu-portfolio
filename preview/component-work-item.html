<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Literata:ital,opsz,wght@0,7..72,200..900;1,7..72,200..900&family=Manrope:wght@200..800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../design-system.css">
<style>
  body { padding: var(--s-5); }
  .card { padding: var(--s-5); }
  .card-meta {
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-faint);
    margin-bottom: var(--s-3);
  }
  .swatches { display: grid; gap: var(--s-3); margin-top: var(--s-3); }
</style>
</head>
<body>

<div class="card">
  <div class="card-meta">Work item · thumb + year kicker + title + tags + CTA</div>
  <div style="display: grid; grid-template-columns: 200px 1fr auto; gap: var(--s-6); align-items: start; margin-top: var(--s-3); padding-top: var(--s-4); border-top: 1px solid var(--line-soft);">
    <div style="aspect-ratio: 16/10; background: var(--accent); border-radius: var(--s-1); display: flex; align-items: center; justify-content: center; color: var(--bg); font-family: var(--font-serif); font-style: italic; font-size: 15px; font-variation-settings: 'opsz' 60;">JSQ × Claude Design</div>
    <div style="display: flex; flex-direction: column; gap: var(--s-2);">
      <div class="mono" style="font-size: 11px; color: var(--ink-faint); letter-spacing: 0.08em;">2026</div>
      <div style="font-family: var(--font-serif); font-weight: 400; font-size: 22px; line-height: 1.2; letter-spacing: -0.01em; font-variation-settings: 'opsz' 60;">JSQ Brand System in <em style="font-style: italic;">Claude Design</em></div>
      <div style="color: var(--ink-soft); font-size: 14px; line-height: 1.55;">Built Juniper Square's brand system inside Claude Design.</div>
      <div style="display: flex; gap: var(--s-2); padding-top: var(--s-2); flex-wrap: wrap;">
        <span style="font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; padding: var(--s-1) var(--s-2); border: 1px solid var(--accent); color: var(--accent); background: var(--accent-soft); border-radius: var(--s-1);">New</span>
        <span style="font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; padding: var(--s-1) var(--s-2); border: 1px solid var(--line); color: var(--ink-soft); border-radius: var(--s-1);">Design system</span>
        <span style="font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; padding: var(--s-1) var(--s-2); border: 1px solid var(--line); color: var(--ink-soft); border-radius: var(--s-1);">AI</span>
      </div>
    </div>
    <div style="font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--terra); border: 1px solid var(--terra); padding: var(--s-2) var(--s-4); border-radius: 999px; align-self: start;">View case →</div>
  </div>
</div>
</body>
</html>
