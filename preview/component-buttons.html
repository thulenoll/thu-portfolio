<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Literata:ital,opsz,wght@0,7..72,200..900;1,7..72,200..900&family=Manrope:wght@200..800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../design-system.css">
<style>
  body { padding: var(--s-5); }
  .card { padding: var(--s-5); }
  .card-meta {
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-faint);
    margin-bottom: var(--s-3);
  }
  .swatches { display: grid; gap: var(--s-3); margin-top: var(--s-3); }
</style>
</head>
<body>

<div class="card">
  <div class="card-meta">CTAs · Default + hover (terra-deep fill)</div>
  <div style="display: flex; gap: var(--s-4); margin-top: var(--s-4); align-items: center;">
    <div style="font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--terra); border: 1px solid var(--terra); padding: var(--s-2) var(--s-4); border-radius: 999px; display: inline-flex; align-items: center; gap: var(--s-2);">View case <span>→</span></div>
    <div style="font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--bg); background: var(--terra-deep); border: 1px solid var(--terra-deep); padding: var(--s-2) var(--s-4); border-radius: 999px; display: inline-flex; align-items: center; gap: var(--s-2);">View case <span>→</span></div>
    <div style="font-family: var(--font-mono); font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-soft); border-bottom: 1px solid var(--line); padding-bottom: var(--s-1);">Read more →</div>
  </div>
</div>
</body>
</html>
