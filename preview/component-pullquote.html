<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Literata:ital,opsz,wght@0,7..72,200..900;1,7..72,200..900&family=Manrope:wght@200..800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../design-system.css">
<style>
  body { padding: var(--s-5); }
  .card { padding: var(--s-5); }
  .card-meta {
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-faint);
    margin-bottom: var(--s-3);
  }
  .swatches { display: grid; gap: var(--s-3); margin-top: var(--s-3); }
</style>
</head>
<body>

<div class="card">
  <div class="card-meta">Pullquote · terra rule + Literata italic accent</div>
  <blockquote style="margin: var(--s-4) 0 0; padding-left: var(--s-6); border-left: 3px solid var(--terra); font-family: var(--font-serif); font-weight: 350; font-size: 26px; line-height: 1.3; color: var(--ink); letter-spacing: -0.014em; max-width: 28ch; font-variation-settings: 'opsz' 90;">
    The interesting design problem wasn't a screen. It was the <em style="font-style: italic; color: var(--terra);">system</em> behind the screens.
  </blockquote>
</div>
</body>
</html>
