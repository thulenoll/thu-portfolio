<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Literata:ital,opsz,wght@0,7..72,200..900;1,7..72,200..900&family=Manrope:wght@200..800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../design-system.css">
<style>
  body { padding: var(--s-5); }
  .card { padding: var(--s-5); }
  .card-meta {
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-faint);
    margin-bottom: var(--s-3);
  }
  .swatches { display: grid; gap: var(--s-3); margin-top: var(--s-3); }
</style>
</head>
<body>

<div class="card">
  <div class="card-meta">4pt scale · --s-1 → --s-32</div>
  <div style="display: grid; grid-template-columns: 80px 1fr; gap: var(--s-2) var(--s-4); margin-top: var(--s-3); align-items: center; font-family: var(--font-mono); font-size: 11px; color: var(--ink-faint);">
    <div>--s-1 · 4px</div><div><span style="display:inline-block; height:8px; background:var(--terra); width:4px;"></span></div><div>--s-2 · 8px</div><div><span style="display:inline-block; height:8px; background:var(--terra); width:8px;"></span></div><div>--s-3 · 12px</div><div><span style="display:inline-block; height:8px; background:var(--terra); width:12px;"></span></div><div>--s-4 · 16px</div><div><span style="display:inline-block; height:8px; background:var(--terra); width:16px;"></span></div><div>--s-6 · 24px</div><div><span style="display:inline-block; height:8px; background:var(--terra); width:24px;"></span></div><div>--s-8 · 32px</div><div><span style="display:inline-block; height:8px; background:var(--terra); width:32px;"></span></div><div>--s-12 · 48px</div><div><span style="display:inline-block; height:8px; background:var(--terra); width:48px;"></span></div><div>--s-16 · 64px</div><div><span style="display:inline-block; height:8px; background:var(--terra); width:64px;"></span></div><div>--s-20 · 80px</div><div><span style="display:inline-block; height:8px; background:var(--terra); width:80px;"></span></div><div>--s-24 · 96px</div><div><span style="display:inline-block; height:8px; background:var(--terra); width:96px;"></span></div>
  </div>
</div>
</body>
</html>
